name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: false
        default: ''

jobs:
  release:
    name: Build & Release macOS DMG
    runs-on: macos-26

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build artifacts
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-build-universal-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src-tauri/src/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-universal-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-universal-

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Validate Apple Developer certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12

          # Decode exactly what GitHub stored without appending a trailing newline.
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          echo "Decoded certificate size: $(wc -c < "$CERT_PATH") bytes"
          shasum -a 256 "$CERT_PATH"

          # Fail here if the secret or password does not produce a valid PKCS#12 bundle.
          openssl pkcs12 -in "$CERT_PATH" -info -noout -passin pass:"$APPLE_CERTIFICATE_PASSWORD"

      - name: Import Apple Developer certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: List imported signing identities
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        run: security find-identity -v -p codesigning

      - name: Resolve signing identity
        id: resolve_identity
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        run: |
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning | awk -F '"' '/Developer ID Application: / { print $2; exit }')

          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "No Developer ID Application identity found in the imported keychain." >&2
            echo "This release workflow expects a Developer ID Application certificate for macOS DMG signing." >&2
            echo "Available code-signing identities:" >&2
            security find-identity -v -p codesigning >&2
            exit 1
          fi

          echo "Using signing identity: $SIGNING_IDENTITY"
          echo "signing_identity=$SIGNING_IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Build universal DMG
        env:
          # Ensure binary runs on macOS 10.15+ (Tauri 2 minimum)
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          APPLE_SIGNING_IDENTITY: ${{ steps.resolve_identity.outputs.signing_identity || secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bunx tauri build --target universal-apple-darwin --bundles dmg

      - name: Locate DMG artifact
        id: find_dmg
        run: |
          DMG_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          echo "dmg_path=$DMG_PATH" >> $GITHUB_OUTPUT
          echo "Found DMG: $DMG_PATH"

      - name: Create GitHub Release and upload DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: Token Watch ${{ github.ref_name || inputs.tag }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ${{ steps.find_dmg.outputs.dmg_path }}
          body: |
            ## Installation

            1. Download `Token Watch_*.dmg` below
            2. Open the DMG and drag **Token Watch** into your Applications folder
            3. Right-click the app → **Open** (first launch only, for unsigned builds)

            Token Watch lives in your menu bar after launch.
